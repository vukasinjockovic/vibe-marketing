    HTML → Vite + UnoCSS → Puppeteer PDF pipeline.

pipeline:
  build_tool: "Vite + UnoCSS"
  pdf_generator: "Puppeteer (scripts/generate-pdf.js)"
  config: "vite.config.ts — auto-discovers w*/index.html"
  shared_styles: "shared/styles/print-base.css"
  shared_entry: "shared/main.ts"
  uno_config: "uno.config.ts"
  generate_command: "cd starter-kit && node scripts/generate-pdf.js <folder-name>"

design_system:
  fonts:
    heading: "Cormorant Garamond (400, 500, 600, 700, italic)"
    body: "Inter (300, 400, 500, 600)"
  colors:
    brand_accent: "rose-400 (#c56d7d) — headers, accents, checkboxes"
    body_text: "prussian-900 (#0a1929)"
    secondary: "slate-500 (#617e9e)"
    tips: "slate-400 italic"
    fill_lines: "thistle-300 (#c4a1ac)"
    section_lines: "rose gradient → thistle → transparent"
  css_shortcuts:
    - "print-page — A4 page container"
    - "section-title — uppercase section headers"
    - "check-item — checkbox row (flex items-start gap-2.5)"
    - "check-label — item text (13px prussian-900)"
    - "check-note — italic tip (11px slate-500)"
    - "fill-line — write-in line (thistle border-bottom)"
    - "page-break — CSS page-break-before: always"
    - "corner-flourish — decorative corners (page 1 only)"
  page_template: "print-page min-h-297mm px-14mm py-8mm box-border"
  footer_domain: "our-forever-stories.com"
  brand_header: '<p class="font-body text-10px tracking-[0.3em] uppercase text-rose-400 mb-1">Our Forever Stories</p>'

