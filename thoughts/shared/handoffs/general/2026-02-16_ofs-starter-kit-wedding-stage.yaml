lessons_learned:
  - "Timeline dots/nodes with CSS absolute positioning don't render reliably in Puppeteer PDF — ditched for simpler layout"
  - "PDFs are not editable — don't build complex visual elements that look nice on screen but can't be filled in by hand"
  - "Consistent section pattern (section-title + section-line + content) works well across all items"
  - "fill-line class + generous spacing = actually usable as a hand-written planner"
  - "Subagent parallelization works well for batch creation — 6 items in ~6 minutes"
  - "Auto-discover vite config (w*/index.html glob) means no config changes for new items"
  - "Excel generation via openpyxl is straightforward — branded colors, formulas, conditional formatting all work"
  - "QA agents catch common subagent issues: missing footers, dead space, clustering from space-y instead of flex justify-between"
  - "flex flex-col justify-between is the correct pattern for distributing fill lines evenly across a full page"
