blockers:
  - DataImpulse 40GB budget may not cover all 648K URLs (projected ~46GB at 75KB avg) — monitor bandwidth
  - ~2% Cloudflare block rate — retried automatically but adds bandwidth overhead

questions:
  - If bandwidth runs out before all URLs scraped, should we prioritize remaining residential URLs or stop?
  - Should we run a second pass for the "retry" (CF blocked) URLs after the main scrape completes?
  - Thumbtack URLs (68K in DB) — scrape those next?

decisions:
  - session_pool_rotate_100: Fresh-per-request crashed (double-free at 700 URLs). Session pool with rotation every 100 requests per worker: 0-1.4% block rate, 33 req/s, no crashes
  - stream_cutoff_2nd_bp: Abort stream at 2nd "business-profile" component — saves 43% bandwidth while keeping ALL useful data (reviews, FAQ, categories)
  - chrome131_impersonation: chrome136 returns 403, chrome131 works consistently — CF checks TLS fingerprint validity
  - batch_writes_20: Flush SQLite every 20 records or 5 seconds to minimize crash data loss
  - retry_3x_backoff: 403s retried 3 times with 1s/3s/5s backoff; still-blocked URLs marked "retry" for next run
  - priority_order: Residential URLs first (most recent), then Unknown/Old, then Common Crawl (oldest, highest dead rate)

findings:
  - rsc_payload_duplicated: Angi RSC response contains the entire page TWICE (desktop render + hydration copy) — second copy is pure waste
  - rsc_reviews_before_list: Actual review text+cost data appears BEFORE the "pro-profiles-reviews-list" component, not inside it
  - soft_404_detection: Angi returns HTTP 200 for dead pages but includes "NEXT_NOT_FOUND" in RSC payload
  - dead_rate_low: Only ~7% of URLs are dead (tested across CC/residential/old sources) — much lower than expected for 2017+ URLs
  - avg_profile_75kb: Average streamed profile is ~75KB (with cutoff), ranging from 62KB (small) to 173KB (review-heavy)
  - cloudflare_no_head: CF blocks HEAD requests entirely and ignores Range headers — no cheap pre-check possible
  - bandwidth_cost_404: Dead URLs cost only ~7.7KB each (soft 404 response) — negligible waste
  - phone_fill_86pct: ~86% of profiles have phone numbers; some businesses simply don't list them
  - review_fill_94pct: 94% of profiles have extractable review text
  - homeadvisor_logo_urls: Logo URLs point to cdn.homeadvisor.com — confirms HA/Angi backend integration

worked:
  - curl_cffi chrome131 impersonation bypasses Cloudflare TLS fingerprinting
  - Fresh session per request (not reused) — critical for avoiding CF session correlation
  - RSC header trick (RSC:1 + Next-Router-State-Tree) returns structured data instead of HTML
  - Streaming with early abort saves 43% bandwidth
  - ThreadPoolExecutor with 100 workers sustains 20+ req/s through DataImpulse
  - Batch SQLite writes with WAL mode handles concurrent inserts well

failed:
  - httpx with proxy gets 403 (no TLS impersonation)
  - curl_cffi chrome136 gets 403 (fingerprint too new/not recognized)
  - Session reuse causes 60% CF block rate (session correlation fingerprint)
  - HEAD requests blocked by CF entirely
  - Range header ignored by CF CDN

next:
  - Monitor scrape progress — check status periodically
  - When complete, run retry pass for CF-blocked URLs
  - Run --status to verify data quality (phone/review/address fill rates)
  - Consider scraping Thumbtack 68K providers next
  - When DataImpulse budget allows, resume residential URL discovery for remaining 151 Angi categories

