decisions:
  - cc_byte_range_extraction: Download only relevant CDX shard blocks via HTTP byte-range requests instead of full shards — reduces downloads from 50MB to 1-7MB per crawl
  - separate_ha_table: HomeAdvisor stored in separate homeadvisor_urls table (ha_id, company_name, url) since URL structure and IDs are completely different from Angi
  - path_based_dedup: Deduplicate angieslist.com vs angi.com by URL path (not full URL) since angieslist.com 301-redirects to angi.com with identical paths
  - cc_angieslist_category_tag: CC-sourced URLs tagged with category='cc-angieslist' or 'cc-angi' to distinguish from proxy scraper data

findings:
  - cc_crawls_independent: Each CC crawl captures almost entirely different pages (<1% overlap between any pair) — combining 58+ crawls yields massive unique URL counts
  - angieslist_goldmine: Pre-2021 angieslist.com CC data was the biggest haul (349k new URLs) — CC crawled it heavily 2017-2019 after paywall dropped in 2016
  - angieslist_redirects: angieslist.com 301-redirects to angi.com with identical paths and provider IDs preserved
  - homeadvisor_no_redirect: homeadvisor.com does NOT redirect to angi.com — returns 403 (Cloudflare) with no redirect, completely different URL structure (/rated.{Name}.{haId}.html)
  - homeadvisor_still_live: homeadvisor.com still serves 200 responses as of Oct 2024 in CC data — it's a separate live site
  - bbb_not_in_cc: bbb.org not present in any CC crawl (blocks crawler or heavy JS rendering)
  - cluster_idx_binary_search: CC cluster.idx is 70-130MB sorted by SURT key — need binary search by byte-range to find domain entries efficiently
  - angi_claims_inflated: Angi claims "millions" but likely counts same business across multiple cities/categories — real unique businesses closer to 500-800k

worked:
  - CC byte-range extraction technique — 1-7MB per crawl instead of downloading full 50MB+ shards
  - Probing cluster.idx with binary search to find exact byte offsets for target domains
  - Path-based deduplication across angieslist.com and angi.com domains
  - Tagging CC-sourced URLs by source for tracking
  - Running extractions sequentially with 3s delay — no rate limiting issues from CC

failed:
  - Initial cluster.idx search used too-small byte ranges (500KB-5MB) — needed 10-20MB ranges depending on file size
  - Some crawls returned 0 blocks due to wrong byte range — needed to try multiple ranges per crawl
  - Wayback CDX showNumPages returns "-" for large result sets — need to paginate manually with page=0,1,2...

next:
