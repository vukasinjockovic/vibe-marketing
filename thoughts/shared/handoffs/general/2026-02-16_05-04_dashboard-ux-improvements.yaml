decisions:
  - resource_content_resolution: "ResourceDetailPanel now uses resolveContentSource() from useResourceContent.ts - checks DB content first, falls back to loading from disk via /api/file-content. Same pattern as full resource detail page."
  - monaco_in_modals: "Added automaticLayout:true to VMonacoEditor defaults + nextTick + setTimeout(250ms) layout calls. The v-show approach means Monaco creates editor on hidden container; these ensure proper sizing after visibility."
  - url_filter_sync: "Type/status filter computed setters reset resources_page to undefined (page 1) automatically, so the watch only needs to handle searchQuery reset."
  - modal_padding_negation: "Used -mx-6 -my-4 wrapper div to negate VModal's px-6 py-4 content padding, letting ResourceDetailPanel's own padding handle layout."
  - cache_busting: "All file-serve URLs now append ?v={mtime} from FileEntry.modified field. Covers images, video, audio, epub, docx, spreadsheets, and text content."

findings:
  - resource_content_on_disk: "Most resources store content on disk (filePath) not in DB content field. ResourceDetailPanel was only checking resource.content, showing 'No content to display' for disk-based resources. This was the real reason Monaco appeared broken in modals."
  - content_disposition_for_downloads: "Browser ignores a.download attribute for cross-origin or when server sends conflicting headers. Setting Content-Disposition: attachment; filename='...' on the server is the reliable fix."

worked:
  - "resolveContentSource + $fetch('/api/file-content') for loading disk content in ResourceDetailPanel"
  - "Computed get/set pattern for URL query param sync (router.replace preserves other params)"
  - "serveUrl() helper centralizes cache busting across all file-serve calls"

failed:
  - "Initial Monaco modal fix (nextTick layout only) didn't help because the real issue was content not loading from disk, not a layout problem"
  - "npx nuxi build from project root occasionally fails with '@nuxt/kit' resolution error - running from dashboard/ dir fixes it"

