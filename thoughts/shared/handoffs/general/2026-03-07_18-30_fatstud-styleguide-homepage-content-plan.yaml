decisions:
  - brand_palette: "DeWalt-inspired — primary yellow #FEBD17, secondary charcoal #2D2D2D, accent safety orange #FF6B00, light mode site"
  - fonts: "Google Sans self-hosted (body), Inter Black for logo paths. NO Google Fonts CDN imports."
  - logo_direction: "FATSTUD wordmark with yellow ruler bar underneath. Two variants — black text (light bg) and white text (dark bg). Converted to SVG paths via opentype.js for zero font dependency."
  - css_architecture: "Follows GymZillaTribe pattern — variables.css (@theme block) → fonts.css → typography.css → buttons.css → badges.css → forms.css → wysiwyg.css, imported via custom.css"
  - view_override: "App-level views override starter views (no namespace needed). BusinessPressViewFinder merges paths: app → starter → core."
  - cpt_pattern: "App-level definitions/cpts/*.php + app/Models/*.php extending BusinessPress Core CPT model. Registered via bp:optimize."
  - calculator_count: "104 unique non-cost calculators identified. 80 are simple Alpine.js arithmetic. 12 are complex SVG-generating (Blocklayer-style printable templates)."
  - content_factory: "Massive scraping operation planned — scrape blogs, YouTube transcripts, Reddit/Quora via vibe-marketing agents, cross-reference with 16 keyword groups (40.6M monthly searches), generate thousands of blog posts"
  - dropped_cost_calcs: "Skipping cost/price calculators for now (homewyse-style) — will add later with zip-code localized pricing"

findings:
  - yelp_pseo_goldmine: "Yelp 'Related Searches' = free pSEO keywords with city-level targeting. Pattern: '{Service} in {City}, {State}' — massive long-tail for directory phase."
  - blocklayer_moat: "Blocklayer's printable full-scale cutting templates (pipe notching, dovetails, rafter birdsmouth) are unique — nobody has replicated these. All client-side JS, fully reverse-engineerable."
  - calculator_sites_pattern: "White bg + single accent color, calculator above fold, real-time calc on input, long SEO content below, ads AROUND (never inside) calculator."
  - build_estimate: "425 dev hours (~10 weeks) to build all 104 calculators. 55 are difficulty-1 (2hrs each), 25 difficulty-2, 15 difficulty-3, 12 difficulty-4."
  - content_preplan: "1,304-line pre-plan doc ready for fresh session to convert into task-by-task implementation plan"

worked:
  - "Subagent delegation pattern — kraken for implementation, oracle for research, scout for exploration, spark for quick fixes"
