findings:
  - angi_rsc_protocol: "Angi uses React Server Components — sending RSC:1 header gets structured data payload instead of HTML shell. 7 named components parsed: business-profile, pro-profiles, ratings, reviews-list, faq, head-metadata, business-images"
  - scrapling_v03_api: "Fetcher API changed in v0.3: proxy is kwarg to get(), not constructor. Response uses .body (bytes) and .status, not .text/.status_code"
  - angi_url_pattern: "Detail pages at /companylist/us/{state}/{city}/{business-slug}-reviews-{spid}.htm"
  - thin_body_not_relevant: "Angi serves full RSC payload to any IP with RSC:1 header — thin-body detection (from blog scraper) not needed here"

worked:
  - "scrapling Fetcher + stealthy_headers=True + RSC:1 header + DataImpulse = 200 OK from Angi"
