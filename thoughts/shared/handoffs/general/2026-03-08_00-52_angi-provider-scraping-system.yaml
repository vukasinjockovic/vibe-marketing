    - name: fatstud-reverb
      config: /etc/supervisor/conf.d/fatstud-reverb.conf
      user: www-data
      port: 8897
    - name: fatstud-sidecar
      config: /etc/supervisor/conf.d/fatstud-sidecar.conf
      user: vuk
