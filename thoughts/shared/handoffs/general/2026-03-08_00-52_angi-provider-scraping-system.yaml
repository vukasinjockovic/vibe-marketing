blockers:
  - "RSC regex parsing incomplete: review_count, years_in_business, provider_categories returning empty for some providers — needs regex tuning against actual RSC payloads"
  - "Fatstud not on Octane — running php-fpm via nginx"

decisions:
  - proxy_architecture: "DataImpulse proxy configured in supervisor env var (ANGI_SCRAPER_PROXY), not in Laravel .env — only Python sidecar needs it"
  - websocket_routing: "WebSocket via /app path on same nginx vhost (port 443) rather than separate ws.fatstud subdomain — simpler setup"
  - scrapling_config: "stealthy_headers=True required for Cloudflare bypass — without it, RSC:1 header alone gets 403. Proxy kwarg goes in get() not configure()."
  - wef_field_naming: "Used provider_city, provider_state, provider_categories to avoid conflict with core CPT columns"
  - supervisor_over_pm2: "Supervisor for all 3 processes (matching OF pattern and all other BusinessPress sites)"

findings:
  - scrapling_api_v03: "Fetcher API changed in v0.3: proxy is kwarg to get(), not constructor arg. configure() is for parser settings only. Response uses .body (bytes) and .status, not .text/.status_code."
  - cpt_name_column: "CPT table uses 'name' not 'title' column — job was inserting into nonexistent 'title' column"
  - typesense_38_fields: "bp_provider collection has 38 fields including geopoint 'location', faceted city/state/categories, sortable rating/reviews/years"

worked:
  - "scrapling Fetcher with stealthy_headers=True + RSC:1 header + DataImpulse proxy = 200 OK from Angi detail pages"
  - "enableMetaBuffering() + setWEF() loop + flushCoreMeta() for efficient batch meta saves"
  - "WEF JSON in app-level wef-json/ dir auto-discovered by WEFService — 33 fields registered on first bp:optimize"
  - "getSchemaColumnOverrides() with meta.field_name keys to force filterable/sortable on WEF fields in Typesense"
  - "Supervisor pattern from OF scraper works identically for fatstud"

failed:
  - "scrapling Fetcher(proxy=...) constructor — deprecated in v0.3, throws warning"
  - "fetcher.configure(proxy=...) — configure() is for parser kwargs only, not HTTP proxy"
  - "fetcher.get(url, headless=False) — headless is not a valid kwarg for Fetcher.get"
  - "Provider.title = name — CPT uses 'name' column, not 'title'"

