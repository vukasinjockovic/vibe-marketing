  - osha_data_scope: 22.4M records total — 5.16M inspections, 13.2M violations, 165K accidents, 231K injuries, 1.15M abstracts, 2.46M related
  - osha_wa_construction: 101,697 WA construction inspections (SIC 1500-1799, NAICS 236/237/238)
  - osha_update_frequency: DOL updates OSHA data DAILY. LOAD_DT field tracks when records entered the system. History goes back to 1972.
  - osha_download_pattern: "https://data.dol.gov/data-catalog/OSHA/{table}/OSHA_{table}.zip"
  - zip_chunk_counts: inspection=104, violation=265, accident=4, injury=5, abstract=24, related=50 CSV chunks per zip
  - match_rate_55pct: 55.6% of WA construction inspections matched to a contractor. 12,367 unique contractors have OSHA data.
  - penalties_34m: $34.3M in total penalties across 83,450 matched violations
  - multiline_csv_gotcha: WA CSV files have embedded newlines in quoted address fields — wc -l overcounts vs actual records

worked:
  - multiprocessing.Pool with 12 workers for CSV ingestion — 130K rows/s, 22.4M in 2.4min
  - pg_trgm LATERAL + LIMIT 1 for fuzzy matching — single SQL statement, GIN index usage
  - OPERATOR(public.%) syntax to bypass psycopg2 % escaping
  - Deduplicating OSHA names before fuzzy matching (88K unique vs 101K total)
  - Parallel curl downloads for all 6 OSHA files simultaneously
