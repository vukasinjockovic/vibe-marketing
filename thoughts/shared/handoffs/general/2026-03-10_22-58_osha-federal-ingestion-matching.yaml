blockers:
  - business_name_normalized column in master.contractors is broken (strips "CO" from "CONSTRUCTION" → "NSTRUCTION"). Matching uses raw business_name instead.

questions:
  - Should we increase fuzzy threshold from 0.5 to reduce false positives (like "K C CONSTRUCTION" matching "AB & K CONSTRUCTION")?
  - Some OSHA estab_names have prefixed license numbers (e.g. "WA317948116 - I 5 RESTORATION, INC.") — should we strip the prefix before matching?
  - The 45K unmatched inspections — are those out-of-state companies working in WA, or name mismatches worth investigating?
  - Should the matching script run automatically after each OSHA sync, or stay manual?

decisions:
  - multiprocessing_over_threading: Python GIL makes ThreadPoolExecutor useless for CPU-bound CSV parsing. Switched to multiprocessing.Pool — 7x speedup (130K rows/s vs 18K rows/s)
  - bigint_all_integers: Changed all INTEGER columns to BIGINT after nr_in_estab overflow at 4M rows
  - indexes_after_load: Create indexes AFTER bulk insert (not during) for much faster initial load
  - three_tier_matching: Exact name+city → fuzzy+city (threshold 0.5) → fuzzy+zip (threshold 0.65). Balances precision vs recall.
  - lateral_not_join: Use LATERAL subquery with LIMIT 1 instead of full cross-join for fuzzy matching. Still takes ~8min for 86K lookups but is a single SQL statement.
  - operator_syntax: psycopg2 escapes % as format specifier. Use OPERATOR(public.%) syntax to reference pg_trgm % operator.
  - dedup_before_fuzzy: Match on unique (name,city) combos (88K) then spread back to inspections (101K) — avoids redundant fuzzy lookups

