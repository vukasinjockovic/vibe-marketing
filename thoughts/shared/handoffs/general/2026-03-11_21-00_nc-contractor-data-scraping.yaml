decisions:
  - fast_async_over_sequential: CompanyName batch search + aiohttp concurrent workers is 26x faster than sequential license number enumeration
  - detail_only_mode: Skip qualifier/matters AJAX calls by default (empty for >95% of records) — 3x fewer HTTP calls per record
  - three_letter_prefixes: 3-letter CompanyName prefixes stay under 500-result cap for most boards; auto-expand to 4/5-letter when capped
  - concurrency_20: Server handles 20 concurrent requests with no rate limiting, no errors
  - all_boards_parallel: All 5 ARLS boards + WC run simultaneously (different servers, no interference)
  - purge_nc_sourced_only: Purge only deletes source LIKE 'nc_%' contractors (not contractors from other states with NC addresses)

findings:
  - arls_no_json_api: ARLS platform has NO JSON/REST API. Even Accept:application/json returns HTML. /api/ returns 404 on all portals.
  - arls_500_cap: CompanyName search returns max 500 results. 2-letter prefixes always hit cap. 3-letter mostly under cap.
  - arls_concurrent_ok: Server handles 20+ concurrent requests with no rate limiting, no CAPTCHAs, no bans.
  - arls_detail_1572_bytes: Detail page is only 1,572 bytes HTML. Qualifier and matters pages are 8-12 bytes (empty) for inactive licenses.
  - arls_company_vs_account: CompanyName search returns batches (up to 500). AccountNumber search returns 0 or 1. CompanyName is vastly more efficient.
  - wc_2char_minimum: NC IC WC search requires minimum 2-character employer name. Single letter returns 0 results.
  - wc_300_cap: WC search caps at 300 results per query. 2-letter prefix enumeration (1,296 combos) with expansion to 3-letter.
  - ncref_nclclb_empty: Refrigeration and Landscape boards returned 0 results via CompanyName search — may use different data model.
  - ncbeec_34k: Electrical board has 34,144 records — more than expected.
  - ncphb_15k: Plumbing/Heating/Fire Sprinkler board has 15,012 records.
  - raleigh_permits_252k: Raleigh ArcGIS has 252,337 permit rows yielding 21,202 unique contractors with email/phone.

