findings:
  wa_state_plan: "WA is a state-plan state — DOSH handles most safety inspections, NOT federal OSHA. Our OSHA data likely misses most WA safety citations."
  li_verify_api: "L&I Verify at secure.lni.wa.gov/verify/ has unauthenticated JSON API returning DOSH inspections, violations, infractions, strikes, debarments, coverage lapses per UBI. No CAPTCHA, no session needed."
  seattle_permits_16pct: "Only 16% of Seattle permits have contractor names. 84% are owner-pulled with no contractor listed."
  tacoma_permits_58pct: "58% of Tacoma permits have contractor names (much better than Seattle)."
  epa_echo_low_wa: "EPA ECHO has only 76 WA facilities with construction NAICS. Better in KY (13,577), TX (52,097)."
  ag_complaints_count: "9,808 WA construction complaints across 1,331 unique businesses. Top: Beacon Plumbing (117), Solgen Power (101)."
  wsdot_bids: "WSDOT bid PDFs downloadable 2013-2025, ~1K projects, parseable with pdftotext + regex."
  king_county_captcha: "King County LandmarkWeb has reCAPTCHA v2 sitekey 6LePF5clAAAAAHUGpyT_rrTZl48-STa5Rn6_PMTv on every search."
  prevailing_wage_already_scraped: "L&I Prevailing Wage Intents already scraped (source #5, 1.26M records with prime/sub contractor names, emails, contract amounts)."
  bond_claims_dont_exist: "Bond claims are not publicly available. But L&I Verify API covers enforcement actions, infractions, strikes as alternatives."

