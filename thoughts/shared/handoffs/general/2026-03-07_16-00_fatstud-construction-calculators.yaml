decisions:
  - brand_name: FatStud — "stud" is a construction framing term, double meaning makes it viral/memorable
  - tech_stack: BusinessPress (Laravel 12) + Alpine.js calculators + Blade pSEO templates. NOT Rust/WASM — JS is sufficient for simple arithmetic calculators.
  - monetization_phases: Phase 1 = display ads (RPM $25-50), Phase 2 = lead gen for contractors, Phase 3 = company directory with lead selling
  - calculator_count: ~49 distinct calculator engines, 500-1000+ pSEO variant pages
  - pseo_approach: BusinessPress taxonomies + page-builder for seeding pages programmatically, each page gets unique H1/meta/intro/defaults/FAQ
  - dropped_rust_wasm: All calculator math is trivial (L×W×D, area/count, Ohm's law). JS handles in <1ms. Rust/WASM overhead not justified.

findings:
  - total_addressable_market: 40.6M monthly searches across 17,967 keywords
  - hero_keywords: 33 keywords at 50K+ monthly volume (sq ft calc 500K, concrete calc 500K, etc.)
  - revenue_projections: Conservative $10K/mo (1% capture), Moderate $71K/mo (5%), Optimistic $203K/mo (10%)
  - cpc_goldmine: Roofing dominates — "roof repair estimate near me" at $122.89 CPC. 8 of top 20 highest-CPC are roofing.
  - highest_rpm_verticals: Roofing ($50-65), Windows ($35-95 CPC), Flooring ($25-78 CPC), Concrete ($25-35)
  - sq_footage_gateway: 25.8M/mo searches — build first as traffic gateway, cross-link to material calcs
  - build_phases: Phase 1 (8 simple calcs, 2M searches), Phase 2 (8 more, 450K), Phase 3 (10 premium CPC), Phase 4 (100+ pSEO)
  - alpine_js_components: Only need ~10-12 reusable component types to power all 49 calculators
  - domain_availability: Checked 85 domains via whois — fatstud.com confirmed available

